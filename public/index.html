<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kaikei</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg: #f8f8f6;
  --surface: #ffffff;
  --surface2: #f3f4f6;
  --border: #e5e7eb;
  --text: #1a1a1a;
  --text2: #6b7280;
  --accent: #4f46e5;
  --accent-hover: #4338ca;
  --accent-bg: #eef2ff;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --warn: #d97706;
  --warn-bg: #fffbeb;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px var(--border);
  --font: 'Noto Sans JP', -apple-system, 'Hiragino Sans', sans-serif;
}
[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #f0f0ee;
  --text2: #888880;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-bg: #1e1b4b;
  --danger: #f87171;
  --danger-bg: #2a1a1a;
  --success: #4ade80;
  --success-bg: #142318;
  --warn: #fbbf24;
  --warn-bg: #2a2010;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 0 0 1px var(--border);
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, select, textarea {
  font-family: var(--font); font-size: 14px; color: var(--text);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px; outline: none; width: 100%;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 60px; }
a { color: var(--accent); text-decoration: none; }

/* ── LAYOUT ─────────────────────────────────────────── */
#app { display: flex; flex-direction: column; min-height: 100vh; }
header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 48px; border-bottom: 1px solid var(--border);
}
.logo { font-size: 16px; font-weight: 700; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 4px; }
.theme-btn {
  padding: 5px 10px; font-size: 13px; border-radius: var(--radius-sm);
  color: var(--text2); background: transparent; transition: all .15s;
}
.theme-btn.active { background: var(--accent-bg); color: var(--accent); }
.theme-btn:hover:not(.active) { background: var(--surface2); }

nav { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; padding: 8px 12px; background: var(--bg); }
.tab-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; padding: 10px 8px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--surface); color: var(--text2); font-weight: 600; transition: all .15s; margin: 0 4px;
}
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 12px; font-weight: 700; }
.tab-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text2); }
.tab-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); border-width: 2px; font-weight: 600; }

main { flex: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── COMPONENTS ─────────────────────────────────────── */
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; transition: background .12s, opacity .12s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-danger:hover { opacity: .8; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { opacity: .8; }
.btn-success { background: var(--success-bg); color: var(--success); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-active { background: var(--accent); color: #fff; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-kobucho { background: var(--accent-bg); color: var(--accent); }
.badge-manual { background: var(--surface2); color: var(--text2); }
.badge-deleted { background: var(--danger-bg); color: var(--danger); }

label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.required::after { content: ' *'; color: var(--danger); }
.form-row { display: grid; gap: 10px; margin-bottom: 10px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.row-deleted td { opacity: .5; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .15s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); transform: translateY(8px); transition: transform .15s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { font-size: 20px; color: var(--text2); padding: 4px 8px; border-radius: 4px; }
.modal-close:hover { background: var(--surface2); }

.summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
.summary-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; }
.summary-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.summary-value { font-size: 22px; font-weight: 800; color: var(--text); }
.summary-value.positive { color: var(--success); }
.summary-value.negative { color: var(--danger); }

.warn-box { background: var(--warn-bg); border: 1px solid var(--warn); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--warn); margin-bottom: 16px; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--surface); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform .25s, opacity .25s; opacity: 0; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── PRINT ───────────────────────────────────────────── */
@media print {
  body > * { display: none !important; }
  #print-area { display: block !important; }
  .no-print { display: none !important; }
}
#print-area { font-family: 'MS Mincho', 'Yu Mincho', serif; font-size: 11px; color: #000; }

@media (max-width: 768px) {
  .summary-grid { grid-template-columns: 1fr 1fr; }
  nav { grid-template-columns: repeat(4,1fr); }
  .tab-label { font-size: 10px; }
  .tab-icon { font-size: 18px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">kaikei</div>
      <div class="header-right">
        <button class="theme-btn" id="btnThemeLight" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" id="btnThemeDark" onclick="setTheme('dark')">🌙</button>
      </div>
    </div>
    <nav>
      <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
        <span class="tab-icon">📊</span><span class="tab-label">ダッシュボード</span>
      </button>
      <button class="tab-btn" data-tab="ledger" onclick="switchTab('ledger')">
        <span class="tab-icon">📒</span><span class="tab-label">帳簿</span>
      </button>
      <button class="tab-btn" data-tab="tax" onclick="switchTab('tax')">
        <span class="tab-icon">📋</span><span class="tab-label">確定申告</span>
      </button>
      <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">
        <span class="tab-icon">⚙️</span><span class="tab-label">設定</span>
      </button>
    </nav>
  </header>

  <main>
    <!-- ダッシュボード -->
    <div class="tab-panel active" id="tab-dashboard">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <label style="margin:0;font-weight:700;font-size:14px;">年度</label>
        <select id="yearSelect" onchange="onYearChange(this.value)" style="width:110px;"></select>
      </div>
      <div class="summary-grid" id="summaryCards"></div>
      <div class="card" id="cogsBreakdown" style="font-size:13px;padding:14px 20px;"></div>
      <div class="card">
        <div class="card-title">月次損益</div>
        <canvas id="monthlyChart" style="width:100%;display:block;" height="160"></canvas>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div class="card-title" style="margin:0;">kobucho データ取込</div>
          <button class="btn btn-primary btn-sm" onclick="importKobucho()">📥 取り込む</button>
        </div>
        <div id="lastImport" style="font-size:12px;color:var(--text2);"></div>
      </div>
    </div>

    <!-- 帳簿 -->
    <div class="tab-panel" id="tab-ledger">
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn btn-active" id="btnRecordsView" onclick="switchLedger('records')">商品</button>
        <button class="btn btn-ghost" id="btnExpensesView" onclick="switchLedger('expenses')">経費</button>
      </div>
      <div id="ledgerContent"></div>
    </div>

    <!-- 確定申告 -->
    <div class="tab-panel" id="tab-tax">
      <div class="warn-box no-print">⚠️ 本ツールは記帳・集計を補助するものです。税務上の判断は税理士にご相談ください。</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;" class="no-print">
        <button class="btn btn-ghost" onclick="window.print()">🖨️ 印刷</button>
        <button class="btn btn-ghost" onclick="exportCSV()">📥 CSV出力</button>
      </div>
      <div id="print-area"></div>
    </div>

    <!-- 設定 -->
    <div class="tab-panel" id="tab-settings">
      <div id="settingsContent"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Record Modal -->
<div class="modal-overlay" id="recordModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="recordModalTitle">商品を追加</div>
      <button class="modal-close" onclick="closeRecordModal()">×</button>
    </div>
    <input type="hidden" id="f_record_id">
    <div class="form-row form-row-2">
      <div><label class="required">仕入日</label><input type="date" id="f_purchase_date"></div>
      <div><label>ブランド</label><input type="text" id="f_brand" placeholder="CHANEL"></div>
    </div>
    <div class="form-row" style="margin-bottom:10px;">
      <div><label class="required">品名</label><input type="text" id="f_name" placeholder="財布"></div>
    </div>
    <div class="form-row form-row-2">
      <div><label class="required">仕入価格（円）</label><input type="number" id="f_purchase_price" placeholder="50000"></div>
      <div><label>売却日</label><input type="date" id="f_sale_date"></div>
    </div>
    <div class="form-row form-row-3">
      <div><label>売却価格（円）</label><input type="number" id="f_sale_price" placeholder="80000"></div>
      <div><label>手数料（円）</label><input type="number" id="f_fee_amount" placeholder="0"></div>
      <div><label>送料（円）</label><input type="number" id="f_shipping_amount" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-ghost" onclick="closeRecordModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<!-- Expense Modal -->
<div class="modal-overlay" id="expenseModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="expenseModalTitle">経費を追加</div>
      <button class="modal-close" onclick="closeExpenseModal()">×</button>
    </div>
    <input type="hidden" id="f_expense_id">
    <div class="form-row form-row-2">
      <div><label class="required">日付</label><input type="date" id="f_exp_date"></div>
      <div>
        <label class="required">区分</label>
        <select id="f_exp_category"></select>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div><label class="required">金額（円）</label><input type="number" id="f_exp_amount" placeholder="5000"></div>
      <div><label>按分率（%）</label><input type="number" id="f_exp_rate" value="100" min="1" max="100"></div>
    </div>
    <div class="form-row" style="margin-bottom:10px;">
      <div><label>メモ</label><input type="text" id="f_exp_memo" placeholder="メモ"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-ghost" onclick="closeExpenseModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveExpense()">保存</button>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────
let summary  = {};
let records  = [];
let expenses = [];
let categories = [];
let settings = {};
let currentYear = new Date().getFullYear();
let currentTab = 'dashboard';
let currentLedgerView = 'records';
let _toastTimer;

// ── HELPERS ──────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) {
  if (n == null || n === '') return '—';
  return '¥' + Number(n).toLocaleString('ja-JP');
}
function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('ja-JP');
}

let _toastTimerRef;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? 'var(--danger)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(_toastTimerRef);
  _toastTimerRef = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── API HELPERS ───────────────────────────────────────
const api = async (method, path, body) => {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
};
const GET  = (path)    => api('GET',    path);
const POST = (path, b) => api('POST',   path, b);
const PUT  = (path, b) => api('PUT',    path, b);
const DEL  = (path)    => api('DELETE', path);

// ── LOAD FUNCTIONS ────────────────────────────────────
async function loadSettings()   { settings   = await GET('/api/settings'); }
async function loadCategories() { categories = await GET('/api/expense-categories'); }
async function loadSummary()    { summary    = await GET(`/api/summary?year=${currentYear}`); }
async function loadRecords()    { records    = await GET(`/api/records?year=${currentYear}`); }
async function loadExpenses()   { expenses   = await GET(`/api/expenses?year=${currentYear}`); }
async function loadAll() {
  await Promise.all([loadSummary(), loadRecords(), loadExpenses()]);
  renderDashboard();
  renderLedger();
  renderTax();
}

// ── NAVIGATION ────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
}
function switchLedger(view) {
  currentLedgerView = view;
  document.getElementById('btnRecordsView')?.classList.toggle('btn-active', view === 'records');
  document.getElementById('btnRecordsView')?.classList.toggle('btn-ghost', view !== 'records');
  document.getElementById('btnExpensesView')?.classList.toggle('btn-active', view === 'expenses');
  document.getElementById('btnExpensesView')?.classList.toggle('btn-ghost', view !== 'expenses');
  renderLedger();
}

// ── YEAR SELECT ───────────────────────────────────────
function renderYearSelect() {
  const sel = document.getElementById('yearSelect');
  if (!sel) return;
  sel.innerHTML = '';
  for (let y = currentYear - 3; y <= currentYear + 3; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = `${y}年`;
    if (y === currentYear) o.selected = true;
    sel.appendChild(o);
  }
}
async function onYearChange(y) {
  currentYear = parseInt(y);
  await loadAll();
}

// ── THEME ─────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  settings.theme = t;
  document.getElementById('btnThemeLight')?.classList.toggle('active', t !== 'dark');
  document.getElementById('btnThemeDark')?.classList.toggle('active',  t === 'dark');
  document.getElementById('btnSettLight')?.classList.toggle('active', t !== 'dark');
  document.getElementById('btnSettDark')?.classList.toggle('active',  t === 'dark');
  // Redraw chart when theme changes
  drawChart();
}
async function setTheme(t) {
  applyTheme(t);
  await PUT('/api/settings', { theme: t });
}

// ── RENDER DASHBOARD ─────────────────────────────────
function renderDashboard() {
  const s = summary;
  const cards = document.getElementById('summaryCards');
  if (cards) {
    const incomeClass = (s.income || 0) >= 0 ? 'positive' : 'negative';
    cards.innerHTML = `
      <div class="summary-card"><div class="summary-label">売上高</div><div class="summary-value">${fmt(s.sales || 0)}</div></div>
      <div class="summary-card"><div class="summary-label">売上原価</div><div class="summary-value">${fmt(s.cogs || 0)}</div></div>
      <div class="summary-card"><div class="summary-label">経費合計</div><div class="summary-value">${fmt(s.total_expenses || 0)}</div></div>
      <div class="summary-card"><div class="summary-label">所得</div><div class="summary-value ${incomeClass}">${fmt(s.income || 0)}</div></div>
    `;
  }
  const cogs = document.getElementById('cogsBreakdown');
  if (cogs) {
    cogs.innerHTML = `
      <span style="color:var(--text2);font-weight:600;margin-right:8px;">棚卸</span>
      期首棚卸 <strong>${fmt(s.cogs_opening||0)}</strong>
      <span style="margin:0 6px;color:var(--text2)">+</span>
      当期仕入 <strong>${fmt(s.cogs_purchases||0)}</strong>
      <span style="margin:0 6px;color:var(--text2)">−</span>
      期末棚卸 <strong>${fmt(s.cogs_closing||0)}</strong>
      <span style="margin:0 6px;color:var(--text2)">=</span>
      売上原価 <strong style="color:var(--accent)">${fmt(s.cogs||0)}</strong>
    `;
  }
  drawChart();
  const li = document.getElementById('lastImport');
  if (li) {
    li.textContent = settings.last_import_at ? `最終取込: ${settings.last_import_at}` : '未取込';
  }
}

function drawChart() {
  const canvas = document.getElementById('monthlyChart');
  if (!canvas) return;
  const monthly = summary.monthly || [];
  const container = canvas.parentElement;
  canvas.width  = container ? container.clientWidth - 40 : 600;
  canvas.height = 160;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD = { t: 16, b: 28, l: 8, r: 8 };
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;
  const midY = PAD.t + cH / 2;
  ctx.clearRect(0, 0, W, H);
  if (!monthly.length) return;

  const vals = monthly.map(m => m.profit || 0);
  const maxV = Math.max(...vals.map(Math.abs), 1);
  const style = getComputedStyle(document.documentElement);
  const accent  = style.getPropertyValue('--accent').trim() || '#4f46e5';
  const danger  = style.getPropertyValue('--danger').trim() || '#dc2626';
  const border  = style.getPropertyValue('--border').trim() || '#e5e7eb';
  const text2   = style.getPropertyValue('--text2').trim()  || '#6b7280';

  ctx.strokeStyle = border; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.l, midY); ctx.lineTo(W - PAD.r, midY); ctx.stroke();

  const bW = cW / 12;
  const gap = bW * 0.3;
  monthly.forEach((m, i) => {
    const val = m.profit || 0;
    const bH  = Math.abs(val) / maxV * (cH / 2);
    const x   = PAD.l + i * bW + gap / 2;
    const bw  = bW - gap;
    ctx.fillStyle = val >= 0 ? accent : danger;
    ctx.fillRect(x, val >= 0 ? midY - bH : midY, bw, bH || 1);
    ctx.fillStyle = text2;
    ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${m.month}月`, x + bw / 2, H - 5);
  });
}

async function testKobuchoPath() {
  const p = document.getElementById('set_kobucho_path')?.value || '';
  const st = document.getElementById('kobuchoPathStatus');
  if (!p) { if (st) st.textContent = 'パスを入力してください'; return; }
  await PUT('/api/settings', { kobucho_db_path: p });
  await loadSettings();
  const r = await GET(`/api/test-kobucho-path?path=${encodeURIComponent(p)}`);
  if (st) {
    st.textContent = r.ok
      ? `✅ 接続成功（${r.count}件の商品が見つかりました）`
      : `❌ ${r.error}`;
    st.style.color = r.ok ? 'var(--success)' : 'var(--danger)';
  }
}

async function autoSearchKobucho() {
  const candidates = [
    'C:\\Users\\harut\\Desktop\\kobucho\\data\\furyo.db',
    String(window.location.hostname === 'localhost' ? '' : '') + '..\\kobucho\\data\\furyo.db'
  ];
  const inp = document.getElementById('set_kobucho_path');
  for (const c of candidates) {
    const r = await GET(`/api/test-kobucho-path?path=${encodeURIComponent(c)}`);
    if (r.ok) {
      if (inp) inp.value = c;
      await PUT('/api/settings', { kobucho_db_path: c });
      await loadSettings();
      const st = document.getElementById('kobuchoPathStatus');
      if (st) { st.textContent = `✅ 自動検索成功（${r.count}件）`; st.style.color = 'var(--success)'; }
      return;
    }
  }
  toast('自動検索で見つかりませんでした。パスを手動で入力してください', true);
}

  toast('削除しました');
}

// ── IMPORT ────────────────────────────────────────────
async function importKobucho() {
  const r = await POST('/api/import-kobucho');
  if (r.error) { toast(r.error, true); return; }
  await loadSettings();
  await loadAll();
  toast(`${r.imported}件取り込みました（合計${r.total}件）`);
  const li = document.getElementById('lastImport');
  if (li) li.textContent = `最終取込: ${settings.last_import_at || ''}`;
}

// ── CSV EXPORT ────────────────────────────────────────
function exportCSV() {
  const s   = summary;
  const Y   = currentYear;
  const rows = [
    ['収支サマリー', `${Y}年分`],
    ['項目', '金額'],
    ['売上高', s.sales || 0],
    ['期首棚卸高', s.cogs_opening || 0],
    ['当期仕入高', s.cogs_purchases || 0],
    ['期末棚卸高', s.cogs_closing || 0],
    ['売上原価', s.cogs || 0],
    ['売上総利益', s.gross_profit || 0],
    [],
    ['経費明細'],
    ['区分', '金額'],
    ...Object.entries(s.expenses_by_category || {}).map(([k,v]) => [k, v]),
    ['送料合計（荷造運賃に含む）', s.shipping_total || 0],
    ['手数料合計（支払手数料に含む）', s.fee_total || 0],
    ['経費合計', s.total_expenses || 0],
    [],
    ['所得金額', s.income || 0],
  ];
  const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `kaikei_${Y}.csv`;
  a.click();
}

// ── BOOT（全定義の後に実行）──────────────────────────
(async () => {
  try {
    await Promise.all([loadSettings(), loadCategories()]);
    applyTheme(settings.theme || 'light');
    renderYearSelect();
    await loadAll();
    renderSettings();
  } catch (e) {
    console.error('初期化エラー:', e);
  }
})();
</script>
